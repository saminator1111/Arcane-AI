<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="/pages/javascript/global.js" defer></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/pages/javascript/profile.js" defer></script>
    <link rel="stylesheet" href="/pages/stylesheets/global.css">
    <link rel="stylesheet" href="/pages/stylesheets/profile.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <title>Profile</title>
</head>
<body>
    <div id="navbar-container"></div>


    <div id="profile-page-wrapper">
        <main id="profile-page">
            <aside id="profile-left">
                <div id="profile-picture-container">
                    <a id="img-wrapper">
                        <img id="profile-picture" src="/pages/stylesheets/assets/blankpfp.jpg" alt="Profile Picture">
                    </a>
                </div>
                <div id="profile-tag-container">
                    <h2 id="profile-username"><span>@</span>Username</h2>
                    <span id="profile-badge">Badge</span>
                </div>
                <div id="profile-bio-container">
                    <p id="profile-bio">This is the user's bio. It can be a short description about the user.</p>
                </div>
                <div id="profile-join-date">
                    <span id="join-date-label">Joined </span>
                    <span id="join-date-value">January 1, 2024</span>
                </div>
                <hr>
                <div id="profile-stats">
                    <div class="stat-row">
                        <span class="stat-label">Bots Created</span>
                        <span class="stat-value">0</span>
                    </div>

                    <div class="stat-row">
                        <span class="stat-label">Followers</span>
                        <span class="stat-value">0</span>
                    </div>

                    <div class="stat-row">
                        <span class="stat-label">Following</span>
                        <span class="stat-value">0</span>
                    </div>

                    <div class="stat-row">
                        <span class="stat-label">Total Chats</span>
                        <span class="stat-value">0</span>
                    </div>
                </div>
                <hr>
                <div id="edit-profile" class="">
                    <button id="edit-profile-button">
                        <i data-lucide="pencil" id="edit-profile-icon"></i>
                        Edit Profile
                    </button>
                </div>
            </aside>


            <section id="profile-center">
                <div id="center-panel">
                    <nav id="profile-tabs-wrapper" role="tablist" aria-label="Profile tabs">
                        <button class="tab active" id="bots" role="tab" aria-selected="true">Bots</button>
                        <button class="tab" id="favorites" role="tab" aria-selected="false">Favorites</button>
                        <button class="tab" id="activity" role="tab" aria-selected="false">Activity</button>
                    </nav>

                    <div id="center-wrapper">
                        <div id="top-section">
                            <div id="top-section-left" class="top-section-content">
                                <h3 id="top-section-title">My Bots</h3>
                                <span id="number" class="">0</span>
                            </div>
                            <div id="top-section-right" class="top-section-content">
                                <div class="dropdown">
                                    <button id="dropdown-button">Sort By</button>
                                    <div id="dropdown-content" class="dropdown-content">
                                        <button class="dropdown-item">Most Recent</button>
                                        <button class="dropdown-item">Oldest</button>
                                        <button class="dropdown-item">Most Popular</button>
                                        <button class="dropdown-item">Least Popular</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div id="bot-grid"></div>

                        <button id="load-more-button">Load More</button>
                    </div>
                </div>
            </section>


            <aside id="profile-right">
                <div id="top-right-section">


                    <div class="right-section-header-wrapper">
                        <h3 id="right-section-title-top" class="right-section-headers">Notifications</h3>
                        <i data-lucide="bell" id="notification-bell-icon"></i>
                    </div>

                    <hr class="right-section-divider">

                    <div id="notifications-container">

                    </div>

                </div>

                <div id="middle-right-section">

                    <div class="right-section-header-wrapper">
                        <h3 id="right-section-title-middle" class="right-section-headers">Status</h3>
                        <i data-lucide="info" id="status-info-icon"></i>
                    </div>

                    <hr class="right-section-divider">

                    <div id="status-container">

                    </div>

                </div>

                <div id="bottom-right-section">
                    
                    <div class="right-section-header-wrapper">
                        <h3 id="right-section-title-bottom" class="right-section-headers">Achievements</h3>
                        <i data-lucide="trophy" id="achievements-trophy-icon"></i>
                    </div>

                    <hr class="right-section-divider">

                    <div id="achievements-container">

                    </div>

                </div>
            </aside>
        </main>
    </div>
</body>
</html>
